name: TikTok Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */30 * * *'  # Run every 30 minutes

permissions:
  contents: write
  actions: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install discord.py requests

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TIKTOK_USERNAMES: ${{ secrets.TIKTOK_USERNAMES }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py

      - name: Save state
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          if [ -f last_videos.json ]; then
            git add last_videos.json
            git diff --cached --quiet || git commit -m "Update last videos state [skip ci]"
            git push || echo "Push failed, will retry next run"
          fi
